<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Season 25-26 Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Intern Season 25-26</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for a company...">
        </div>
    </header>
    
    <main>
        <nav class="categories" id="categoriesNav">
            <button class="active" data-cat="all">All Companies</button>
            <button data-cat="Day 1 Tech">Day 1 Tech</button>
            <button data-cat="Day 1 Non-Tech">Day 1 Non-Tech</button>
            <button data-cat="Week 1">Week 1</button>
            <button data-cat="Early Events (Before August)">Early Events</button>
            <button data-cat="Uncategorized">Uncategorized</button>
            <button data-cat="PT Cell Event">PT Cell Updates</button>
        </nav>
        
        <div id="companyList" class="company-list">
            <!-- Company list generated by JS -->
        </div>

        <div id="timelineView" class="timeline-view hidden">
            <button id="backBtn" class="back-btn">&larr; Back to Companies</button>
            <h2 id="timelineCompanyName"></h2>
            <div id="timelineContainer" class="timeline-container">
                <!-- Timeline items generated by JS -->
            </div>
        </div>
    </main>
    
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
